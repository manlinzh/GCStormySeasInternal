

<svg viewBox="0 0 180 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Board shapes -->
  <g stroke="#000">
    <!-- board yellow background -->
    <rect x="0" y="0" width="180" height="20" fill="#fbf600" stroke-width="0"/>
    <rect x="0" y="0" width="20" height="180" fill="#fbf600" stroke-width="0"/>
    <rect x="160" y="0" width="20" height="180" fill="#fbf600" stroke-width="0"/>
    <rect x="0" y="120" width="80" height="40" fill="#fbf600" stroke-width="0"/>
    <rect x="100" y="120" width="80" height="40" fill="#fbf600" stroke-width="0"/>

    <!-- water all clear -->
    <rect x="20" y="20" width="140" height="100" fill="none" stroke-width="0" />
    <!-- adding landing port -->
    <polygon points="80,140 90,160 80,160" fill="#fbf600" stroke-width="0" />
    <polygon points="100,140 90,160 100,160" fill="#fbf600" stroke-width="0" />
  </g>
</svg>